<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词本</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- KaTeX CSS for LaTeX rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="theme-toggle">
                <button class="theme-btn" id="themeBtn" onclick="toggleThemeDropdown()">
                    <span class="theme-icon" id="themeIcon">🌓</span>
                    <span class="theme-label" id="themeLabel">跟随系统</span>
                </button>
                <div class="theme-dropdown" id="themeDropdown">
                    <button class="theme-option" data-value="light" onclick="setTheme('light')">
                        <span class="theme-icon">☀️</span> 浅色
                    </button>
                    <button class="theme-option" data-value="dark" onclick="setTheme('dark')">
                        <span class="theme-icon">🌙</span> 深色
                    </button>
                    <button class="theme-option active" data-value="system" onclick="setTheme('system')">
                        <span class="theme-icon">🌓</span> 跟随系统
                    </button>
                </div>
            </div>
            <h1>📚 英语单词本</h1>
            <p>记录和复习你的英语单词</p>
            <div id="userStatus" class="user-status">
                <span id="userInfo"></span>
                <button id="accountBtn" class="account-btn" style="display: none;" onclick="openAccountModal()">🔒 账户管理</button>
                <button id="loginBtn" class="login-btn">登录</button>
            </div>
        </header>

        <!-- 顶部导航 -->
        <div class="top-nav">
            <a href="/" class="nav-btn active">📚 单词本</a>
            <a href="/ai-chat" class="nav-btn">🤖 AI 对话</a>
            <a href="/sentence" class="nav-btn">📝 句子分析</a>
        </div>

        <!-- 单词输入区域 -->
        <section class="input-section">
            <!-- 单行查询模式 -->
            <div id="singleInputMode">
                <div class="input-group">
                    <input type="text" id="wordInput" placeholder="输入英语单词..." autocomplete="off">
                    <button id="queryBtn">查询/添加</button>
                </div>
            </div>
            <!-- 批量查询模式 -->
            <div id="batchInputMode" style="display: none;">
                <div class="input-group batch-input-group">
                    <textarea id="batchWordInput" placeholder="输入英语单词，一词一换行..." class="batch-textarea" rows="5"></textarea>
                </div>
                <div class="batch-actions">
                    <button id="batchQueryBtn" class="batch-btn">🔍 批量查询</button>
                    <button id="clearBatchBtn" class="batch-clear-btn">清空</button>
                    <button id="batchImportTxtBtn" class="batch-import-btn">
                        📄 导入 TXT
                        <input type="file" id="batchTxtFile" accept=".txt" style="display: none;">
                    </button>
                </div>
                <div id="batchProgress" class="batch-progress" style="display: none;">
                    <div class="batch-progress-bar">
                        <div id="batchProgressBar" class="batch-progress-fill"></div>
                    </div>
                    <span id="batchProgressText" class="batch-progress-text"></span>
                </div>
            </div>
            <div class="input-mode-toggle">
                <button id="toggleModeBtn" class="mode-toggle-btn" onclick="toggleInputMode()">📋 切换到批量模式</button>
                <div class="import-export-actions">
                    <button class="import-btn" onclick="openImportModal()">📥 导入 JSON</button>
                    <button class="export-btn" onclick="openExportDropdown()">📤 导出</button>
                    <div id="exportDropdown" class="export-dropdown" style="display: none;">
                        <button onclick="exportWords('json')">导出为 JSON</button>
                        <button onclick="exportWords('csv')">导出为 CSV</button>
                    </div>
                    <a href="/offline" class="offline-link" title="离线浏览">📴 离线模式</a>
                </div>
            </div>
            <div id="loadingIndicator" class="loading" style="display: none;">
                <span>查询中...</span>
            </div>
            <div id="errorMessage" class="error-message" style="display: none;"></div>
            <div id="successMessage" class="success-message" style="display: none;"></div>
        </section>

        <!-- 单词列表展示区域 -->
        <section class="words-section">
            <h2>单词列表</h2>
            <div id="wordsList" class="words-list">
                <div class="empty-state">
                    <p>暂无单词记录</p>
                    <p>开始添加你的第一个单词吧！</p>
                </div>
            </div>
            <!-- 分页控件 -->
            <div id="pagination" class="pagination" style="display: none;">
                <button id="prevPageBtn" class="page-btn" onclick="changePage(-1)">上一页</button>
                <span id="pageInfo" class="page-info"></span>
                <button id="nextPageBtn" class="page-btn" onclick="changePage(1)">下一页</button>
            </div>
        </section>

        <!-- 单词详情弹窗 -->
        <div id="wordModal" class="modal" style="display: none;">
            <div class="modal-content">
                <span class="close-btn" onclick="closeModal()">&times;</span>
                <div id="modalBody">
                    <!-- 动态内容 -->
                </div>
            </div>
        </div>

        <!-- 登录/注册弹窗 -->
        <div id="loginModal" class="modal" style="display: none;">
            <div class="modal-content">
                <span class="close-btn" onclick="closeLoginModal()">&times;</span>
                <div id="loginModalBody">
                    <div class="auth-tabs">
                        <button class="tab-btn active" onclick="switchTab('login')">登录</button>
                        <button class="tab-btn" onclick="switchTab('register')">注册</button>
                    </div>
                    <div id="loginForm">
                        <div class="form-group">
                            <label>用户名：</label>
                            <input type="text" id="loginUsername" class="form-input" placeholder="输入用户名">
                        </div>
                        <div class="form-group">
                            <label>密码（可选）：</label>
                            <input type="password" id="loginPassword" class="form-input" placeholder="如果设置了密码，请填写">
                            <small style="color: var(--text-light);">如果用户未设置密码，可以直接登录</small>
                        </div>
                        <button class="save-btn" onclick="handleLogin()">登录</button>
                    </div>
                    <div id="registerForm" style="display: none;">
                        <div class="form-group">
                            <label>用户名：</label>
                            <input type="text" id="registerUsername" class="form-input" placeholder="输入用户名（至少3个字符）">
                        </div>
                        <div class="form-group">
                            <label>密码（可选）：</label>
                            <input type="password" id="registerPassword" class="form-input" placeholder="设置密码（可选）">
                            <small style="color: var(--text-light);">如果不需要密码，可以直接注册</small>
                        </div>
                        <button class="save-btn" onclick="handleRegister()">注册</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 账户管理弹窗 -->
        <div id="accountModal" class="modal" style="display: none;">
            <div class="modal-content" style="max-width: 420px;">
                <span class="close-btn" onclick="closeAccountModal()">&times;</span>
                <div class="word-edit-form">
                    <h3>🔒 修改密码</h3>
                    <div class="form-group">
                        <label>原密码：</label>
                        <input type="password" id="oldPassword" class="form-input" placeholder="如果没有设置密码，留空即可">
                    </div>
                    <div class="form-group">
                        <label>新密码：</label>
                        <input type="password" id="newPassword" class="form-input" placeholder="输入新密码（至少4个字符）">
                    </div>
                    <div class="form-group">
                        <label>重复新密码：</label>
                        <input type="password" id="confirmPassword" class="form-input" placeholder="再次输入新密码">
                    </div>
                    <div class="form-actions">
                        <button class="save-btn" onclick="handleChangePassword()">确认修改</button>
                        <button class="cancel-btn" onclick="closeAccountModal()">取消</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- AI 聊天窗口 -->
        <div id="aiChatModal" class="modal" style="display: none;">
            <div class="modal-content chat-content">
                <span class="close-btn" onclick="closeAIChatModal()">&times;</span>
                <div class="chat-header">
                    <h3>与 DeepSeek AI 对话</h3>
                    <div class="chat-controls">
                        <select id="aiModelSelect" class="model-select" onchange="changeAIModel()">
                            <option value="deepseek-v4-pro" selected>DeepSeek-V4-Pro</option>
                        </select>
                        <button class="clear-btn" onclick="clearChatHistory()">清空记录</button>
                    </div>
                </div>
                <div id="chatMessages" class="chat-messages">
                    <div class="chat-welcome">
                        <p>你好！我是 DeepSeek AI，有什么可以帮助你的吗？</p>
                    </div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="输入消息..." class="chat-input" onkeypress="handleChatKeyPress(event)">
                    <button class="send-btn" onclick="sendChatMessage()">发送</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 导入弹窗 -->
    <div id="importModal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 500px;">
            <span class="close-btn" onclick="closeImportModal()">&times;</span>
            <div class="word-edit-form">
                <h3>📥 导入单词</h3>
                <div class="form-group">
                    <label>选择文件（JSON / CSV）：</label>
                    <div class="import-upload-zone" id="importUploadZone">
                        <div class="import-upload-icon">📥</div>
                        <p class="import-upload-text">拖放文件到此处</p>
                        <p class="import-upload-hint">支持 .json 和 .csv 格式</p>
                        <div class="import-upload-formats">
                            <span class="format-tag">JSON</span>
                            <span class="format-tag">CSV</span>
                        </div>
                        <input type="file" id="importFile" accept=".json,.csv" style="display: none;">
                    </div>
                </div>
                <!-- 解析预览区域 -->
                <div id="importPreview" class="import-preview" style="display: none;">
                    <div class="import-preview-header">
                        <span id="importPreviewCount"></span>
                        <span id="importPreviewType" class="preview-file-type"></span>
                        <button class="clear-preview-btn" onclick="clearImportPreview()">清除</button>
                    </div>
                    <div id="importPreviewList" class="import-preview-list"></div>
                </div>
                <div id="importError" class="error-message" style="display: none; margin-top: 10px;"></div>
                <div id="importProgress" class="batch-progress" style="display: none;">
                    <div class="batch-progress-bar">
                        <div id="importProgressBar" class="batch-progress-fill"></div>
                    </div>
                    <span id="importProgressText" class="batch-progress-text"></span>
                </div>
                <div class="form-actions">
                    <button class="save-btn" id="importSubmitBtn" onclick="handleImport()" disabled>开始导入</button>
                    <button class="cancel-btn" onclick="closeImportModal()">取消</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 公共主题 JS -->
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
