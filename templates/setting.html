<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员设置</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>document.documentElement.setAttribute('data-theme', 'dark');</script>
    <style>
        .setting-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .setting-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
        }
        .setting-header h1 {
            color: var(--primary-color);
            font-size: 1.8em;
        }
        .back-btn {
            padding: 8px 16px;
            background-color: var(--text-light);
            color: var(--on-text-light);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            transition: background-color 0.3s;
        }
        .back-btn:hover {
            background-color: var(--neutral-hover);
        }
        .user-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-background);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        .user-table th,
        .user-table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        .user-table th {
            background: var(--background-color);
            color: var(--text-color);
            font-weight: 600;
            font-size: 14px;
        }
        .user-table td {
            color: var(--text-color);
            font-size: 14px;
        }
        .user-table tr:hover {
            background: var(--background-color);
        }
        .user-table tr:last-child td {
            border-bottom: none;
        }
        .password-status {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .password-set {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .password-unset {
            background: #fff3e0;
            color: #e65100;
        }
        [data-theme="dark"] .password-set {
            background: #1b3a1b;
            color: #81c784;
        }
        [data-theme="dark"] .password-unset {
            background: #3a2a1b;
            color: #ffb74d;
        }
        .action-btns {
            display: flex;
            gap: 6px;
        }
        .action-btn {
            padding: 5px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background-color 0.3s;
        }
        .pwd-btn {
            background-color: var(--primary-color);
            color: var(--on-primary);
        }
        .pwd-btn:hover {
            background-color: var(--primary-hover);
        }
        .del-btn {
            background-color: var(--danger-color);
            color: var(--on-danger);
        }
        .del-btn:hover {
            background-color: var(--danger-hover);
        }
        /* 修改密码弹窗 */
        .change-pwd-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--modal-overlay);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .change-pwd-modal.show {
            display: flex;
        }
        .change-pwd-content {
            background: var(--card-background);
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            box-shadow: var(--shadow-hover);
            animation: modalFadeIn 0.3s;
        }
        .change-pwd-content h3 {
            color: var(--primary-color);
            margin-bottom: 20px;
            font-size: 1.3em;
        }
        .change-pwd-content .form-group {
            margin-bottom: 15px;
        }
        .change-pwd-content .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-color);
        }
        .change-pwd-content .form-input {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            background-color: var(--input-bg);
            color: var(--text-color);
            transition: border-color 0.3s;
        }
        .change-pwd-content .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .change-pwd-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .admin-badge {
            display: inline-block;
            background: var(--primary-color);
            color: var(--on-primary);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            margin-left: 6px;
        }
        .empty-users {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
        }

        /* ==================== 颜色库管理 ==================== */
        .color-management {
            margin-top: 30px;
            background: var(--card-background);
            border-radius: 12px;
            padding: 28px;
            box-shadow: var(--shadow);
        }

        .color-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .color-header h2 {
            color: var(--primary-color);
            font-size: 1.3em;
            margin: 0;
        }

        .color-header-desc {
            color: var(--text-light);
            font-size: 13px;
            margin: 0 0 20px 0;
            line-height: 1.5;
        }

        .preset-group {
            display: flex;
            gap: 8px;
            background: var(--background-color);
            padding: 4px;
            border-radius: 8px;
        }

        .preset-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.25s;
            background: transparent;
            color: var(--text-light);
        }

        .preset-btn:hover {
            color: var(--text-color);
        }

        .preset-btn.active {
            background: var(--primary-color);
            color: var(--on-primary);
        }

        /* 颜色卡片网格 */
        .color-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 20px;
        }

        .color-card {
            background: var(--background-color);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }

        .color-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
            border-color: var(--primary-color);
        }

        .color-card-swatch {
            height: 64px;
            position: relative;
            transition: filter 0.2s;
        }

        .color-card:hover .color-card-swatch {
            filter: brightness(0.95);
        }

        .color-card-body {
            padding: 12px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .color-card-value {
            font-family: 'Consolas', 'Courier New', 'Fira Code', monospace;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-color);
            letter-spacing: 0.5px;
        }

        .color-card-actions {
            display: flex;
            gap: 4px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .color-card:hover .color-card-actions {
            opacity: 1;
        }

        .color-card-btn {
            width: 30px;
            height: 30px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            background: var(--border-color);
        }

        .color-card-btn:hover {
            background: var(--primary-color);
            color: var(--on-primary);
        }

        .color-card-btn.delete:hover {
            background: var(--danger-color);
            color: var(--on-danger);
        }

        /* 添加颜色区域 */
        .add-color-section {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .color-input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 220px;
            background: var(--background-color);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 6px 10px;
            transition: border-color 0.25s;
        }

        .color-input-wrapper:focus-within {
            border-color: var(--primary-color);
        }

        .color-input-preview {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .color-input-field {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text-color);
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            outline: none;
            padding: 6px 0;
        }

        .color-input-field::placeholder {
            color: var(--text-light);
        }

        .add-color-btn {
            padding: 10px 20px;
            background: var(--secondary-color);
            color: var(--on-secondary);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .add-color-btn:hover {
            background: var(--secondary-hover);
            transform: translateY(-1px);
        }

        .reset-colors-btn {
            padding: 10px 20px;
            background: var(--text-light);
            color: var(--on-text-light);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .reset-colors-btn:hover {
            background: var(--neutral-hover);
        }

        /* 消息提示 */
        .color-msg {
            margin-top: 14px;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            display: none;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .color-msg.success {
            display: block;
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }

        .color-msg.error {
            display: block;
            background: var(--error-bg);
            color: var(--error-text);
            border: 1px solid var(--error-text);
        }

        [data-theme="dark"] .color-msg.success {
            background: #1b3a1b;
            color: #81c784;
            border-color: #2e7d32;
        }

        /* 空状态 */
        .color-empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
            font-size: 14px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .color-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .color-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .add-color-section {
                flex-direction: column;
            }
            .add-color-btn, .reset-colors-btn {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .color-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="setting-container">
        <div class="setting-header">
            <h1>⚙️ 管理员设置</h1>
            <a href="/" class="back-btn">← 返回单词本</a>
        </div>

        <table class="user-table" id="userTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>用户名</th>
                    <th>密码状态</th>
                    <th>创建时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="userTableBody">
                <tr>
                    <td colspan="5" class="empty-users">加载中...</td>
                </tr>
            </tbody>
        </table>

        <!-- 颜色库管理 -->
        <div class="color-management">
            <div class="color-header">
                <h2>🎨 颜色库管理</h2>
                <div class="preset-group">
                    <button class="preset-btn active" id="presetLightBtn" onclick="applyPreset('light')">☀️ 浅色预设</button>
                    <button class="preset-btn" id="presetDarkBtn" onclick="applyPreset('dark')">🌙 深色预设</button>
                </div>
            </div>
            <p class="color-header-desc">
                管理句子分析中使用的颜色库。相同类型的成分使用相同颜色，新类型自动分配颜色。
                <br>预设提供适配浅色/深色主题的颜色方案，你也可以自由增删改颜色。
            </p>
            <div id="colorGrid" class="color-grid"></div>
            <div class="add-color-section">
                <div class="color-input-wrapper">
                    <div id="newColorPreview" class="color-input-preview" style="background-color: #d0e6ff;"></div>
                    <input type="text" id="newColorInput" class="color-input-field" placeholder="输入颜色值，如 #d0e6ff" maxlength="7">
                </div>
                <button class="add-color-btn" onclick="addColor()">➕ 添加颜色</button>
                <button class="reset-colors-btn" onclick="resetColors()">🔄 恢复默认</button>
            </div>
            <div id="colorMsg" class="color-msg"></div>
        </div>

        <!-- 编辑颜色弹窗 -->
        <div id="editColorModal" class="change-pwd-modal">
            <div class="change-pwd-content" style="max-width: 360px;">
                <h3>✏️ 编辑颜色</h3>
                <div class="form-group" style="display: flex; align-items: center; gap: 12px;">
                    <div id="editColorPreview" style="width: 48px; height: 48px; border-radius: 10px; border: 2px solid var(--border-color); flex-shrink: 0;"></div>
                    <div style="flex: 1;">
                        <label style="display: block; margin-bottom: 6px; font-weight: 600; font-size: 13px; color: var(--text-color);">颜色值（十六进制）</label>
                        <input type="text" id="editColorInput" class="form-input" placeholder="#d0e6ff" maxlength="7">
                    </div>
                </div>
                <div class="change-pwd-actions">
                    <button class="action-btn pwd-btn" onclick="saveEditColor()">💾 保存</button>
                    <button class="action-btn" style="background: var(--text-light); color: var(--on-text-light);" onclick="closeEditColorModal()">取消</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 修改密码弹窗 -->
    <div id="changePwdModal" class="change-pwd-modal">
        <div class="change-pwd-content">
            <h3 id="changePwdTitle">修改密码</h3>
            <div class="form-group">
                <label>新密码：</label>
                <input type="password" id="newPassword" class="form-input" placeholder="输入新密码（留空则不设密码）">
            </div>
            <div class="form-group">
                <label>确认新密码：</label>
                <input type="password" id="confirmNewPassword" class="form-input" placeholder="再次输入新密码">
            </div>
            <div class="change-pwd-actions">
                <button class="action-btn pwd-btn" onclick="submitChangePassword()">确认修改</button>
                <button class="action-btn" style="background: var(--text-light); color: var(--on-text-light);" onclick="closeChangePwdModal()">取消</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let users = [];
        let selectedUserId = null;

        // 加载用户列表
        async function loadUsers() {
            console.log('loadUsers called, API_BASE =', API_BASE);
            try {
                const resp = await fetch(`${API_BASE}/admin/users`);
                console.log('response status:', resp.status);
                if (resp.status === 401 || resp.status === 403) {
                    alert('需要管理员权限');
                    window.location.href = '/';
                    return;
                }
                if (!resp.ok) {
                    throw new Error('加载失败');
                }
                users = await resp.json();
                renderUsers();
            } catch (e) {
                document.getElementById('userTableBody').innerHTML =
                    `<tr><td colspan="5" class="empty-users">加载失败: ${e.message}</td></tr>`;
            }
        }

        function renderUsers() {
            const tbody = document.getElementById('userTableBody');
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty-users">暂无用户</td></tr>';
                return;
            }

            tbody.innerHTML = users.map(user => {
                const safeName = escapeJs(user.username);
                const delBtn = user.username !== 'admin'
                    ? `<button class="action-btn del-btn" onclick="deleteUser(${user.id}, '${safeName}')">删除</button>`
                    : '';
                return `<tr>
                    <td>${user.id}</td>
                    <td>${escapeHtml(user.username)}${user.username === 'admin' ? '<span class="admin-badge">管理员</span>' : ''}</td>
                    <td><span class="password-status ${user.has_password ? 'password-set' : 'password-unset'}">${user.has_password ? '已设置' : '未设置'}</span></td>
                    <td>${formatDate(user.created_at)}</td>
                    <td>
                        <div class="action-btns">
                            <button class="action-btn pwd-btn" onclick="openChangePwdModal(${user.id}, '${safeName}')">修改密码</button>
                            ${delBtn}
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        function openChangePwdModal(userId, username) {
            selectedUserId = userId;
            document.getElementById('changePwdTitle').textContent = `修改 "${username}" 的密码`;
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmNewPassword').value = '';
            document.getElementById('changePwdModal').classList.add('show');
        }

        function closeChangePwdModal() {
            document.getElementById('changePwdModal').classList.remove('show');
            selectedUserId = null;
        }

        async function submitChangePassword() {
            const newPwd = document.getElementById('newPassword').value;
            const confirmPwd = document.getElementById('confirmNewPassword').value;

            if (newPwd !== confirmPwd) {
                alert('两次输入的密码不一致');
                return;
            }

            try {
                const resp = await fetch(`${API_BASE}/admin/users/${selectedUserId}/password`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ new_password: newPwd })
                });

                const data = await resp.json();

                if (resp.ok) {
                    alert(data.message);
                    closeChangePwdModal();
                    loadUsers();
                } else {
                    alert(data.error || '修改失败');
                }
            } catch (e) {
                alert('网络错误');
            }
        }

        async function deleteUser(userId, username) {
            if (!confirm(`确定要删除用户 "${username}" 吗？\n此操作将同时删除该用户的所有单词和聊天记录，不可恢复。`)) {
                return;
            }

            try {
                const resp = await fetch(`${API_BASE}/admin/users/${userId}`, {
                    method: 'DELETE'
                });

                const data = await resp.json();

                if (resp.ok) {
                    alert(data.message);
                    loadUsers();
                } else {
                    alert(data.error || '删除失败');
                }
            } catch (e) {
                alert('网络错误');
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function escapeJs(str) {
            return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
        }

        function formatDate(dateStr) {
            if (!dateStr) return '未知';
            const d = new Date(dateStr);
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        // ==================== 颜色库管理 ====================
        let editColorIndex = -1;
        let currentPreset = 'light';

        const PRESETS = {
            light: ['#d0e6ff', '#d4f0d4', '#ffe0b2', '#f3e5f5', '#fff9c4', '#e0f7fa'],
            dark:  ['#8ab4e0', '#8cd4a0', '#f0c080', '#c8a0e0', '#e8d880', '#88d0d8']
        };

        async function loadColors() {
            try {
                const resp = await fetch(`${API_BASE}/settings/colors`);
                if (resp.ok) {
                    const data = await resp.json();
                    renderColors(data.colors);
                }
            } catch (e) {
                console.error('加载颜色库失败:', e);
            }
        }

        function renderColors(colors) {
            const grid = document.getElementById('colorGrid');
            if (!colors || colors.length === 0) {
                grid.innerHTML = '<div class="color-empty">暂无颜色，请添加或选择预设</div>';
                return;
            }
            grid.innerHTML = colors.map((c, i) => `
                <div class="color-card">
                    <div class="color-card-swatch" style="background-color: ${c};"></div>
                    <div class="color-card-body">
                        <span class="color-card-value">${escapeHtml(c)}</span>
                        <div class="color-card-actions">
                            <button class="color-card-btn" title="编辑" onclick="openEditColor(${i}, '${c}')">✏️</button>
                            <button class="color-card-btn delete" title="删除" onclick="deleteColor(${i})">🗑️</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 实时预览输入颜色
        document.addEventListener('DOMContentLoaded', function() {
            const input = document.getElementById('newColorInput');
            const preview = document.getElementById('newColorPreview');
            if (input && preview) {
                input.addEventListener('input', function() {
                    const val = this.value.trim();
                    if (/^#[0-9A-Fa-f]{6}$/.test(val)) {
                        preview.style.backgroundColor = val;
                    }
                });
            }
        });

        async function addColor() {
            const input = document.getElementById('newColorInput');
            const color = input.value.trim();
            if (!color) {
                showColorMsg('请输入颜色值', 'error');
                return;
            }
            if (!/^#[0-9A-Fa-f]{6}$/.test(color)) {
                showColorMsg('颜色格式不正确，请使用 #RRGGBB 格式', 'error');
                return;
            }

            try {
                const resp = await fetch(`${API_BASE}/settings/colors`);
                const data = await resp.json();
                const colors = data.colors || [];
                colors.push(color);
                await saveColors(colors);
                input.value = '';
                document.getElementById('newColorPreview').style.backgroundColor = '#d0e6ff';
            } catch (e) {
                showColorMsg('添加失败: ' + e.message, 'error');
            }
        }

        async function saveColors(colors) {
            const resp = await fetch(`${API_BASE}/settings/colors`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ colors: colors })
            });
            const data = await resp.json();
            if (resp.ok) {
                renderColors(data.colors);
                showColorMsg('颜色库已保存', 'success');
            } else {
                showColorMsg(data.error || '保存失败', 'error');
            }
        }

        function openEditColor(index, oldColor) {
            editColorIndex = index;
            document.getElementById('editColorPreview').style.backgroundColor = oldColor;
            document.getElementById('editColorInput').value = oldColor;
            document.getElementById('editColorModal').classList.add('show');
        }

        function closeEditColorModal() {
            document.getElementById('editColorModal').classList.remove('show');
            editColorIndex = -1;
        }

        async function saveEditColor() {
            const newColor = document.getElementById('editColorInput').value.trim();
            if (!/^#[0-9A-Fa-f]{6}$/.test(newColor)) {
                alert('颜色格式不正确，请使用 #RRGGBB 格式');
                return;
            }
            const resp = await fetch(`${API_BASE}/settings/colors`);
            const data = await resp.json();
            const colors = data.colors || [];
            colors[editColorIndex] = newColor;
            await saveColors(colors);
            closeEditColorModal();
        }

        async function deleteColor(index) {
            if (!confirm('确定删除这个颜色吗？')) return;
            const resp = await fetch(`${API_BASE}/settings/colors`);
            const data = await resp.json();
            const colors = data.colors || [];
            colors.splice(index, 1);
            await saveColors(colors);
        }

        async function resetColors() {
            if (!confirm('确定恢复默认颜色库吗？')) return;
            try {
                const resp = await fetch(`${API_BASE}/settings/colors/reset`, { method: 'POST' });
                const data = await resp.json();
                if (resp.ok) {
                    renderColors(data.colors);
                    currentPreset = 'light';
                    updatePresetButtons();
                    showColorMsg('颜色库已恢复默认', 'success');
                } else {
                    showColorMsg(data.error || '重置失败', 'error');
                }
            } catch (e) {
                showColorMsg('重置失败: ' + e.message, 'error');
            }
        }

        async function applyPreset(type) {
            const colors = PRESETS[type];
            if (!colors) return;
            const resp = await fetch(`${API_BASE}/settings/colors`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ colors: colors })
            });
            const data = await resp.json();
            if (resp.ok) {
                renderColors(data.colors);
                currentPreset = type;
                updatePresetButtons();
                showColorMsg(type === 'light' ? '已切换为浅色主题预设' : '已切换为深色主题预设', 'success');
            } else {
                showColorMsg(data.error || '切换失败', 'error');
            }
        }

        function updatePresetButtons() {
            document.getElementById('presetLightBtn').classList.toggle('active', currentPreset === 'light');
            document.getElementById('presetDarkBtn').classList.toggle('active', currentPreset === 'dark');
        }

        function showColorMsg(msg, type) {
            const el = document.getElementById('colorMsg');
            el.textContent = msg;
            el.className = 'color-msg ' + type;
            setTimeout(() => { el.className = 'color-msg'; }, 3000);
        }

        // 初始化
        loadUsers();
        loadColors();
        document.getElementById('changePwdModal').addEventListener('click', function(e) {
            if (e.target === this) closeChangePwdModal();
        });
        document.getElementById('editColorModal').addEventListener('click', function(e) {
            if (e.target === this) closeEditColorModal();
        });
    </script>
</body>
</html>
